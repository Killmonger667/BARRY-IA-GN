<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>RiskTaker IA</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0A0714" />
<style>
  @font-face {
    font-family: 'system-serif';
    src: local('Georgia');
  }
  :root {
    --void: #07050D;
    --void-2: #0F0B1E;
    --panel: #12102080;
    --line: #2A2440;
    --iris: #8B6CFF;
    --iris-soft: #5B4499;
    --iris-glow: #B9A3FF;
    --text: #ECE7FA;
    --text-dim: #9088AE;
    --user-bubble: #1A1530;
    --bot-bubble: #100C1E;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--void);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }
  #stars {
    position: fixed; inset: 0; z-index: 0;
  }
  #app {
    position: relative; z-index: 1;
    height: 100%;
    display: flex; flex-direction: column;
    max-width: 820px; margin: 0 auto;
  }
  header {
    padding: 22px 20px 14px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(to bottom, #07050Dcc, #07050D00);
    backdrop-filter: blur(6px);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .iris {
    width: 34px; height: 34px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--iris-glow), var(--iris) 45%, var(--iris-soft) 70%, transparent 75%);
    box-shadow: 0 0 18px 2px var(--iris-glow), 0 0 40px 8px #5B449966;
    animation: breathe 4s ease-in-out infinite;
    flex-shrink: 0;
  }
  .iris.thinking { animation: breathe 0.9s ease-in-out infinite; }
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.85; }
    50% { transform: scale(1.15); opacity: 1; }
  }
  h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 26px;
    letter-spacing: 0.01em;
    margin: 0;
    background: linear-gradient(90deg, var(--iris-glow), var(--text) 60%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .tagline {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-dim); margin: 4px 0 0 46px;
  }
  #chips {
    display: flex; gap: 8px; padding: 12px 20px 4px; overflow-x: auto;
    scrollbar-width: none;
  }
  #chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    border: 1px solid var(--line);
    background: #ffffff08;
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all .15s ease;
  }
  .chip:hover { border-color: var(--iris); color: var(--text); background: #ffffff12; }

  main {
    flex: 1; overflow-y: auto; padding: 18px 20px 10px;
    display: flex; flex-direction: column; gap: 18px;
  }
  main::-webkit-scrollbar { width: 6px; }
  main::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

  .msg { max-width: 84%; animation: rise .25s ease; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .who {
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 4px;
  }
  .msg.user .who { text-align: right; }
  .bubble {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 15px;
    font-size: 14.5px;
    line-height: 1.65;
    white-space: pre-wrap;
  }
  .msg.user .bubble { background: var(--user-bubble); border-color: #3A3060; }
  .msg.assistant .bubble { background: var(--bot-bubble); }

  .thinking-row { display: flex; align-items: center; gap: 10px; color: var(--text-dim); font-size: 13px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--iris-glow); animation: pulse 1s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .3s; }
  @keyframes pulse { 0%,100% { opacity: .25; } 50% { opacity: 1; } }

  footer {
    padding: 12px 20px 22px;
    border-top: 1px solid var(--line);
    background: linear-gradient(to top, #07050Dcc, #07050D00);
  }
  #inputbar {
    display: flex; align-items: flex-end; gap: 10px;
    background: #ffffff06;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 10px 12px;
  }
  #inputbar:focus-within { border-color: var(--iris-soft); box-shadow: 0 0 0 3px #5B449933; }
  textarea {
    flex: 1; resize: none; border: none; outline: none; background: transparent;
    color: var(--text); font-family: inherit; font-size: 14.5px; line-height: 1.5;
    max-height: 160px; padding: 4px 0;
  }
  textarea::placeholder { color: var(--text-dim); }
  #send {
    border: none; border-radius: 8px; padding: 9px 16px;
    font-size: 12.5px; font-weight: 600; letter-spacing: 0.03em;
    background: var(--iris); color: #07050D; cursor: pointer;
    transition: opacity .15s ease;
  }
  #send:disabled { opacity: .35; cursor: not-allowed; }
  .hint { text-align: center; font-size: 10.5px; color: var(--text-dim); margin-top: 8px; }
  .error { color: #FF9E9E; font-size: 12.5px; }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="app">
  <header>
    <div class="brand">
      <div class="iris" id="iris"></div>
      <h1>RiskTaker IA</h1>
    </div>
    <div class="tagline">Réponses. Rédaction. Code. Stratégie.</div>
  </header>

  <div id="keybar" style="display:none; padding:10px 20px; border-bottom:1px solid var(--line); font-size:12.5px; color:var(--text-dim);">
    <div style="margin-bottom:6px;">Colle ta clé API Anthropic (obtenue sur console.anthropic.com) :</div>
    <div style="display:flex; gap:8px;">
      <input id="apikey" type="password" placeholder="sk-ant-..." style="flex:1; background:#ffffff08; border:1px solid var(--line); border-radius:8px; padding:8px 10px; color:var(--text); font-size:13px;" />
      <button id="savekey" style="border:none; border-radius:8px; padding:8px 14px; background:var(--iris); color:#07050D; font-weight:600; font-size:12.5px;">Enregistrer</button>
    </div>
  </div>

  <div id="chips">
    <div class="chip" data-t="Résume-moi ceci en 5 points clairs : ">Résumer</div>
    <div class="chip" data-t="Traduis ce texte en anglais : ">Traduire</div>
    <div class="chip" data-t="Rédige un email professionnel pour : ">Rédiger un email</div>
    <div class="chip" data-t="Écris du code pour : ">Coder</div>
    <div class="chip" data-t="Aide-moi à trouver des idées pour : ">Brainstormer</div>
    <div class="chip" data-t="Explique-moi simplement : ">Expliquer</div>
    <div class="chip" data-t="Analyse les avantages et inconvénients de : ">Analyser</div>
  </div>

  <main id="chat"></main>

  <footer>
    <div id="inputbar">
      <textarea id="input" rows="1" placeholder="Écrivez votre message…"></textarea>
      <button id="send">Envoyer</button>
    </div>
    <div class="hint">Entrée pour envoyer · Maj+Entrée pour une nouvelle ligne</div>
  </footer>
</div>

<script>
// ---------- Starfield background ----------
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = Array.from({length: 160}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.3 + 0.2,
    a: Math.random(),
    speed: Math.random() * 0.15 + 0.02
  }));
}
window.addEventListener('resize', resize);
resize();
function drawStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const grad = ctx.createRadialGradient(
    canvas.width/2, canvas.height*0.35, 0,
    canvas.width/2, canvas.height*0.35, canvas.width*0.8
  );
  grad.addColorStop(0, '#1C1436');
  grad.addColorStop(1, '#07050D');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    const twinkle = 0.5 + 0.5 * Math.sin(t * 0.001 * s.speed * 10 + s.x);
    ctx.globalAlpha = s.a * twinkle;
    ctx.fillStyle = '#C9BEFF';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);

// ---------- Chat logic ----------
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const iris = document.getElementById('iris');

let messages = [];

// ---------- Gestion de la clé API ----------
const keybar = document.getElementById('keybar');
const apikeyInput = document.getElementById('apikey');
const savekeyBtn = document.getElementById('savekey');

function getApiKey() {
  return localStorage.getItem('risktaker_api_key') || '';
}
function ensureKeyBar() {
  if (!getApiKey()) {
    keybar.style.display = 'block';
  } else {
    keybar.style.display = 'none';
  }
}
savekeyBtn.addEventListener('click', () => {
  const v = apikeyInput.value.trim();
  if (v) {
    localStorage.setItem('risktaker_api_key', v);
    apikeyInput.value = '';
    ensureKeyBar();
  }
});
ensureKeyBar();

function addMessage(role, content) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  const who = document.createElement('div');
  who.className = 'who';
  who.textContent = role === 'user' ? 'vous' : 'risktaker';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = content;
  wrap.appendChild(who);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function addThinking() {
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant';
  wrap.id = 'thinking-msg';
  wrap.innerHTML = `
    <div class="who">risktaker</div>
    <div class="bubble thinking-row">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      <span style="margin-left:4px;">le vide réfléchit…</span>
    </div>`;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}
function removeThinking() {
  const t = document.getElementById('thinking-msg');
  if (t) t.remove();
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || sendBtn.disabled) return;
  addMessage('user', text);
  messages.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  iris.classList.add('thinking');
  addThinking();

  const key = getApiKey();
  if (!key) {
    removeThinking();
    ensureKeyBar();
    const wrap = document.createElement('div');
    wrap.className = 'error';
    wrap.textContent = 'Ajoute ta clé API ci-dessus avant d\'envoyer un message.';
    chat.appendChild(wrap);
    sendBtn.disabled = false;
    iris.classList.remove('thinking');
    return;
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1500,
        system: "Tu es RiskTaker IA, un assistant francophone complet et direct, capable d'aider sur (presque) tout : questions générales, rédaction, code, stratégie, analyse, brainstorming. Réponds de façon claire et utile, en français sauf si on t'écrit dans une autre langue. Si une demande dépasse tes capacités (actions dans le monde réel, navigation web en direct), dis-le clairement et propose une alternative.",
        messages: messages
      })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const textOut = (data.content || [])
      .map(b => b.type === 'text' ? b.text : '')
      .filter(Boolean)
      .join('\n') || '(réponse vide)';
    removeThinking();
    addMessage('assistant', textOut);
    messages.push({ role: 'assistant', content: textOut });
  } catch (e) {
    removeThinking();
    const wrap = document.createElement('div');
    wrap.className = 'error';
    wrap.textContent = 'Un souci est survenu. Réessayez.';
    chat.appendChild(wrap);
  } finally {
    sendBtn.disabled = false;
    iris.classList.remove('thinking');
  }
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
});
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    input.value = chip.dataset.t;
    input.focus();
    input.dispatchEvent(new Event('input'));
  });
});

addMessage('assistant', "Bienvenue dans le vide. Posez-moi une question, confiez-moi une tâche d'écriture ou de code, ou lancez un raccourci ci-dessus.");

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
